experiment_id: group_relative_transform_example
description: Synthetic public example for grouped factor scoring
status: public_example

scope:
  market: generic
  instruments:
    include:
      - common_stock
    exclude:
      - etf
      - reit
      - infrastructure_fund
      - preferred_stock
  direction: long_only
  currency: JPY
  data_frequency: daily

universe:
  point_in_time: true
  min_ipo_age_trading_days: 252
  liquidity_lookback_days: 60
  min_median_trading_value_jpy: null
  require_tradable_on_rebalance_date: true
  strict_rebalance_price_filter: false
  require_fundamentals: true
  output_exclusions: true

strategy:
  group_relative_transforms:
    - group_field: sector
      fields:
        - book_to_market
        - earnings_yield
      methods:
        - zscore
        - rank_pct
      min_group_size: 5
      output_prefix: sector_relative
  scoring:
    mode: weighted_factors
    weights:
      sector_relative_book_to_market_z: 1.0
  filters:
    - field: sector_relative_book_to_market_rank_pct
      rule: exclude_bottom_pct
      pct: 20

factors:
  winsorize:
    lower_pct: 1
    upper_pct: 99
  standardize: cross_sectional_zscore
  missing_values:
    impute_zero: false
    emit_missing_flag: true
  quality:
    weight: 0.4
    variables: []
  value:
    weight: 0.4
    variables: []
  momentum:
    weight: 0.2
    variables: []

portfolio:
  research_portfolio:
    target_holdings_min: 20
    target_holdings_max: 50
    weighting: equal_weight
  executable_portfolio:
    lot_size: 100
    allow_cash_drag: true
    target_holdings_min: 8
    target_holdings_max: 30
  buy_rule:
    rank_top_pct: 10
    rank_top_n: 50
  hold_rule:
    rank_top_pct: 20
    rank_top_n: 100
  sector_cap:
    enabled: false
    group_field: sector
    mode: name_count
    max_names_per_group: 9
  affordable_lot_filter:
    enabled: false
    max_single_lot_weight: 0.05
    min_single_lot_weight: null
    cash_buffer_weight: 0.02
  max_single_name_weight: 0.1
  report_sector_exposure: true

execution:
  price_for_signal_returns: adjusted_close
  price_for_order_size: unadjusted_price
  adv_lookback_days: 60
  max_order_to_median_trading_value: 0.005
  mark_uncertain_fill_on_price_limit: true
  skip_if_not_tradable: true

missing_price_tail_policy:
  mode: warn_only
  max_stale_trading_days: 5

cost_model:
  scenarios:
    base:
      spread_multiplier: 1.0
      impact_multiplier: 1.0
  commission_model: manual
  tick_size_model: generic_price_bucket

tax:
  output_modes:
    - taxable_account
  nisa_like:
    loss_not_deductible: true

go_no_go:
  require_reproducible_results: true
  require_failure_case_review: true
  require_after_cost_not_only_optimistic: true
